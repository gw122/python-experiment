<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seattle Weather Interactive Visualization</title>
    <link rel="icon" href="./cloud.png" type="image/png">
    <link rel="stylesheet" href="./index.css">
    <script src="echarts.js"></script>
</head>
<body>
    <!-- 为 ECharts 准备一个定义了宽高的 DOM -->
    <div>
        <h1>Seattle Weather Interactive Visualization</h1>
    </div>
    <div id="main1" class="container" style="width: 60vw;height:30vw;"></div>
    <div id="main2" class="container" style="width: 60vw;height:30vw;"></div>
    <h2>Weather Type Distribution</h2>
    <div id="main3" class="container" style="width: 60vw;height:30vw;"></div>
    <div id="main4" class="container" style="width: 60vw;height:30vw;"></div>
    <script type="text/javascript">
        const csvUrl = '../data/seattle-weather.csv';
        fetch(csvUrl)
        .then(response => {
            if (!response.ok) throw new Error('文件请求失败');
            return response.text();
        })
        .then(csvText => {
            let temp = csvText.trim().split('\r\n');
            temp.shift()
            const data = temp.map(row => row.split(','));
            //console.log(data);

            var chartDom1 = document.getElementById('main1');
            var myChart1 = echarts.init(chartDom1);
            var option;
            myChart1.setOption(
                (option = {
                title: {
                    text: 'Wind Speed (km/h)',
                    left: '1%'
                },
                tooltip: {
                    trigger: 'axis'
                },
                grid: {
                    left: '5%',
                    right: '15%',
                    bottom: '10%'
                },
                xAxis: {
                    data: data.map(function (item) {
                    return item[0];
                    })
                },
                yAxis: {},
                toolbox: {
                    right: 10,
                    feature: {
                    dataZoom: {
                        yAxisIndex: 'none'
                    },
                    restore: {},
                    saveAsImage: {}
                    }
                },
                dataZoom: [
                    {
                    startValue: '2015-06-01'
                    },
                    {
                    type: 'inside'
                    }
                ],
                visualMap: {
                    top: 50,
                    right: 10,
                    pieces: [
                    {
                        gt: 0,
                        lte: 3,
                        color: '#93CE07'
                    },
                    {
                        gt: 3,
                        lte: 6,
                        color: '#FBDB0F'
                    },
                    {
                        gt: 6,
                        lte: 9,
                        color: '#FC7D02'
                    },
                    ],
                    outOfRange: {
                    color: '#999'
                    }
                },
                series: {
                    name: 'Wind',
                    type: 'line',
                    data: data.map(function (item) {
                    return item[4];
                    }),
                    markLine: {
                    silent: true,
                    lineStyle: {
                        color: '#333'
                    },
                    data: [
                        {
                        yAxis: 50
                        },
                        {
                        yAxis: 100
                        },
                        {
                        yAxis: 150
                        },
                        {
                        yAxis: 200
                        },
                        {
                        yAxis: 250
                        }
                    ]
                    }
                }
                })
            );

            option && myChart1.setOption(option);
        

            var chartDom2 = document.getElementById('main2');
            var myChart2 = echarts.init(chartDom2);

            // prettier-ignore
            
            // prettier-ignore
            const dataAxis = data.map(item => item[0]);
            const data2 = data.map(item => item[1]);
            let yMax = 500;
            let dataShadow = [];
            for (let i = 0; i < data2.length; i++) {
            dataShadow.push(yMax);
            }
            option = {
            title: {
                text: 'Precipitation Trend',
                subtext: ''
            },
            xAxis: {
                data: dataAxis,
                axisLabel: {
                inside: true,
                color: '#333'
                },
                axisTick: {
                show: false
                },
                axisLine: {
                show: false
                },
                z: 10
            },
            yAxis: {
                axisLine: {
                show: false
                },
                axisTick: {
                show: false
                },
                axisLabel: {
                color: '#999'
                }
            },
            dataZoom: [
                {
                type: 'inside'
                }
            ],
            series: [
                {
                type: 'bar',
                showBackground: true,
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: '#83bff6' },
                    { offset: 0.5, color: '#188df0' },
                    { offset: 1, color: '#188df0' }
                    ])
                },
                emphasis: {
                    itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#2378f7' },
                        { offset: 0.7, color: '#2378f7' },
                        { offset: 1, color: '#83bff6' }
                    ])
                    }
                },
                data: data2
                }
            ]
            };
            // Enable data zoom when user click bar.
            const zoomSize = 6;
            myChart2.on('click', function (params) {
            myChart2.dispatchAction({
                type: 'dataZoom',
                startValue: dataAxis[Math.max(params.dataIndex - zoomSize / 2, 0)],
                endValue:
                dataAxis[Math.min(params.dataIndex + zoomSize / 2, data.length - 1)]
            });
            });

            option && myChart2.setOption(option);

            var chartDom3 = document.getElementById('main3');
            var myChart3 = echarts.init(chartDom3);

            let RainDays   = 0
            let SunDays    = 0
            let FogDays    = 0
            let DrizzleDays= 0
            let SnowDays   = 0
            data.forEach(function(item){
                if (item[5] == 'rain'){
                    RainDays += 1
                }else if(item[5] == 'sun'){
                    SunDays += 1
                }else if(item[5] == 'fog'){
                    FogDays += 1
                }else if(item[5] == 'drizzle'){
                    DrizzleDays += 1
                }else{
                    SnowDays += 1
                }
            })
            option = {
            tooltip: {
                trigger: 'item'
            },
            legend: {
                top: '5%',
                left: 'center'
            },
            series: [
                {
                name: 'Weather Type Frequency',
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                label: {
                    show: false,
                    position: 'center'
                },
                emphasis: {
                    label: {
                    show: true,
                    fontSize: 40,
                    fontWeight: 'bold'
                    }
                },
                labelLine: {
                    show: false
                },
                data: [
                    { value: RainDays   , name: 'Rain' },
                    { value: SunDays    , name: 'Sun' },
                    { value: FogDays    , name: 'Fog' },
                    { value: DrizzleDays, name: 'Drizzle' },
                    { value: SnowDays   , name: 'Snow' }
                ]
                }
            ]
            };

            option && myChart3.setOption(option);

            var chartDom4 = document.getElementById('main4');
            var myChart4 = echarts.init(chartDom4);
            

            option = {
            title: {
                text: 'Temperature Trend'
            },
            tooltip: {
                trigger: 'axis'
            },
            // legend: {
            //     data: ['Max Temp', 'Min Temp']
            // },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '3%',
                containLabel: true
            },
            toolbox: {
                feature: {
                saveAsImage: {}
                }
            },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: dataAxis
            },
            yAxis: {
                type: 'value'
            },
            series: [
                {
                name: 'Max Temp',
                type: 'line',
                data: data.map(item => item[2])
                },
                {
                name: 'Min Temp',
                type: 'line',
                data: data.map(item => item[3])
                }
            ],
            dataZoom: [
                {   
                    type: 'slider',
                    orient: 'horizontal',
                    bottom: 0,   // 距离底部 10px
                    left: '5%',   // 左侧留白 5%
                    right: '5%',   // 右侧留白 5%
                    startValue: '2015-06-01'
                }
            ]
            };

            option && myChart4.setOption(option);
            window.addEventListener('resize', function() {
                myChart1.resize();
                myChart2.resize();
                myChart3.resize();
                myChart4.resize();
            });
        })
        .catch(error => console.error('读取失败：', error));

        
    </script>
</body>
</html>
